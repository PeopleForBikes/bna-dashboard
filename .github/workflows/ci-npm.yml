name: ci-npm

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
